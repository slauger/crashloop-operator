suite: ServiceAccount tests
templates:
  - templates/serviceaccount.yaml
tests:
  - it: should create a ServiceAccount by default
    asserts:
      - isKind:
          of: ServiceAccount
      - equal:
          path: metadata.namespace
          value: NAMESPACE

  - it: should not create ServiceAccount when disabled
    set:
      serviceAccount:
        create: false
    asserts:
      - hasDocuments:
          count: 0

  - it: should use custom name when set
    set:
      serviceAccount:
        create: true
        name: custom-sa
    asserts:
      - equal:
          path: metadata.name
          value: custom-sa

  - it: should apply annotations when set
    set:
      serviceAccount:
        create: true
        annotations:
          eks.amazonaws.com/role-arn: arn:aws:iam::123456789:role/my-role
    asserts:
      - equal:
          path: metadata.annotations
          value:
            eks.amazonaws.com/role-arn: arn:aws:iam::123456789:role/my-role
