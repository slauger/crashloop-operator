apiVersion: rbac.authorization.k8s.io/v1
{{- if eq .Values.scope.mode "namespace" }}
kind: Role
{{- else }}
kind: ClusterRole
{{- end }}
metadata:
  name: {{ include "crashloop-operator.fullname" . }}
  {{- if eq .Values.scope.mode "namespace" }}
  namespace: {{ .Values.scope.watchNamespace | default .Release.Namespace }}
  {{- end }}
  labels:
    {{- include "crashloop-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: ["crashloop-operator.lauger.de"]
    resources: ["crashlooppolicies"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["crashloop-operator.lauger.de"]
    resources: ["crashlooppolicies/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["crashloop-operator.lauger.de"]
    resources: ["crashlooppolicies/finalizers"]
    verbs: ["update"]
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["statefulsets"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["", "events.k8s.io"]
    resources: ["events"]
    verbs: ["create", "patch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
